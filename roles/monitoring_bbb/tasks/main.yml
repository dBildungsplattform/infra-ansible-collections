- name: Create ScrapeConfig for BBB blackbox exporter
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig }}"
    proxy: "{{ proxy_url | default(omit, true) }}"
    proxy_headers: "{{ proxy_headers | default(omit, true) }}"
    definition:
      apiVersion: monitoring.coreos.com/v1alpha1
      kind: ScrapeConfig
      metadata:
        name: "{{ bbb_instance_name }}-blackbox-exporter"
        namespace: monitoring
        labels:
          release: application
      spec:
        metricsPath: /probe
        params:
          module: ["http_2xx"]
        ionosSDConfigs: "{{ bbb_datacenter_ionos_sd_configs | from_yaml }}"
        relabelings:
          - sourceLabels: [__meta_ionos_server_name]
            regex: "bbb-.*"
            action: keep
          - sourceLabels: [__meta_ionos_server_state]
            regex: "RUNNING"
            action: keep
          - sourceLabels: [__meta_ionos_server_name]
            targetLabel: __param_target
            regex: "(.*)"
            replacement: "https://${1}/bigbluebutton"
          - sourceLabels: [__param_target]
            targetLabel: instance
          - targetLabel: __address__
            replacement: "{{ bbb_blackbox_exporter_url | default('prometheus-blackbox-exporter:9115') }}"
          - targetLabel: tenant
            replacement: "{{ tenant }}"
        scrapeInterval: "{{ bbb_monitoring_scrape_interval }}"
        scrapeTimeout: "{{ bbb_monitoring_scrape_timeout }}"
  when: true

