---
- name: Create BBB secrets
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig }}"
    proxy: "{{ proxy_url | default(omit, true) }}"
    proxy_headers: "{{ proxy_headers | default(omit, true) }}"
    definition:
      apiVersion: onepassword.com/v1
      kind: OnePasswordItem
      metadata:
        name: "{{ secret }}"
        namespace: monitoring
      spec:
        itemPath: "vaults/{{ bbb_vault }}/items/{{ secret }}"
  loop:
    - "{{ bbb_node_exporter_basic_auth_secret_name }}"
    - "{{ bbb_ionos_basic_auth_secret_name }}"
  loop_control:
    loop_var: secret

- name: Create ScrapeConfig for BBB servers
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig }}"
    proxy: "{{ proxy_url | default(omit, true) }}"
    proxy_headers: "{{ proxy_headers | default(omit, true) }}"
    definition:
      apiVersion: monitoring.coreos.com/v1alpha1
      kind: ScrapeConfig
      metadata:
        name: "{{ bbb_instance_name }}"
        namespace: monitoring
        labels:
          release: application
      spec:
        scheme: https
        metricsPath: "{{ '/mon/bbb' if bbb_ebbba_exporters else '/metrics' }}"
        basicAuth:
          username:
            name: "{{ bbb_node_exporter_basic_auth_secret_name }}"
            key: username
          password:
            name: "{{ bbb_node_exporter_basic_auth_secret_name }}"
            key: password
        ionosSDConfigs: "{{ bbb_datacenter_ionos_sd_configs | from_yaml }}"
        relabelings:
          - sourceLabels: [__meta_ionos_server_name]
            regex: "bbb-.*"
            action: keep
          - sourceLabels: [__meta_ionos_server_state]
            regex: "RUNNING"
            action: keep
          - sourceLabels: [__address__]
            targetLabel: __tmp_metrics_port
            regex: "([^:]+)(:[0-9]+)?"
            replacement: "${2}"
          - sourceLabels: [__meta_ionos_server_name, __tmp_metrics_port]
            targetLabel: __address__
            separator: ""
          - sourceLabels: [__address__]
            targetLabel: instance
            regex: "([^:]+)(:[0-9]+)?"
            replacement: "${1}"
          - targetLabel: tenant
            replacement: "{{ tenant }}"
        scrapeInterval: "{{ bbb_monitoring_scrape_interval }}"
        scrapeTimeout: "{{ bbb_monitoring_scrape_timeout }}"
  when: true

