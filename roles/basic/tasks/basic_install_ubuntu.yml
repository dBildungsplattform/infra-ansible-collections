---
# basic installation
  - name: Remove fwupd
    apt:
      name: fwupd
      state: absent

  - name: Update apt package list
    apt:
      update_cache: true

  - name: Install python3
    apt:
      name: ['python3', 'python3-pip']
      state: latest
    when: basic_install_python

  - name: Set kernel.panic = 20, reboot 20 seconds after kernel panic
    ansible.posix.sysctl:
      name: kernel.panic
      value: '20'
      sysctl_file: /etc/sysctl.d/99-sysctl.conf
  
  - name: Set kernel.pid_max = 100000, allow 100.000 Processes at the system
    ansible.posix.sysctl:
      name: kernel.pid_max
      value: '100000'
      sysctl_file: /etc/sysctl.d/99-sysctl.conf

  - name: Reboot if necessary cronjob
    ansible.builtin.cron:
      state: "{{ basic_reboot_cronjob_enabled | ternary('present', 'absent') }}"
      name: "basic: Weekly reboot for updates"
      cron_file: basic-weekly-reboot
      user: root
      weekday: "{{ basic_reboot_cronjob_weekday }}"
      hour: "{{ basic_reboot_cronjob_hour }}"
      minute: "{{ basic_reboot_cronjob_minute }}"
      job: "[ -f /var/run/reboot-required ] && /usr/sbin/reboot"
